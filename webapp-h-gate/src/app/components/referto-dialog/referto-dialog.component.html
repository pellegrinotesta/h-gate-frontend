<div class="dialog-referto">

    <!-- Header -->
    <div class="dialog-header">
        <div class="header-bg"></div>
        <div class="header-content">
            <div class="header-left">
                <div class="header-icon">
                    <mat-icon>note_add</mat-icon>
                </div>
                <div>
                    <h2 class="header-title">Nuovo Referto</h2>
                    @if(prenotazione) {
                    <div class="header-meta">
                        <span class="meta-chip">
                            <mat-icon>person</mat-icon>
                            {{ prenotazione.pazienteNomeCompleto }}
                        </span>
                        <span class="meta-divider">·</span>
                        <span class="meta-chip">
                            <mat-icon>medical_services</mat-icon>
                            {{ prenotazione.tipoVisita }}
                        </span>
                        <span class="meta-divider">·</span>
                        <span class="meta-chip">
                            <mat-icon>schedule</mat-icon>
                            {{ prenotazione.dataOra }}
                        </span>
                    </div>
                    }
                </div>
            </div>
            <button mat-icon-button (click)="annulla()" class="close-btn">
                <mat-icon>close</mat-icon>
            </button>
        </div>
    </div>

    <!-- Content -->
    <mat-dialog-content class="dialog-content">
        <app-generic-form [fields]="formItems" [editMode]="true" [submitButtonText]="'Salva referto'"
            [cancelButtonText]="'Annulla'" (submit)="salvaReferto($event)" (cancel)="annulla()">
        </app-generic-form>
    </mat-dialog-content>

</div>
